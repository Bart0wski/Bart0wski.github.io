- layout: left
  name: AI-Powered Korean Vocabulary Extraction & Automation
  link: github.com/Bart0wski/android-korean-vocab-extractor-distrib
  github: Bart0wski/android-korean-vocab-extractor-distrib
  quote: >
      Automating the transition from raw Korean text or vocabulary to structured, high-fidelity study materials.
  description: |
    - Built a native **Android app** (Flutter + Riverpod) powered by the **Gemini API** for multi-modal Korean vocabulary extraction from plain text, PDFs, and images with a single tap.
    - Implemented a full **vocabulary management system** backed by SQLite: search, POS/tag filtering, CSV import/export, duplicate detection, and bulk selection.
    - Prototyped an earlier **browser-based version** using a local server built with **Python FastAPI**, serving the same Gemini extraction logic via REST endpoints before the Android rewrite.
    - Leveraged **Claude Code** as a development agent throughout — from architecture decisions to debugging and release automation.
    
      **Tools**: <mark>Gemini API</mark> <mark>Claude Code</mark> <mark>Python</mark> <mark>Android</mark> <mark>Anki</mark>

- layout: left
  name: Multi Network Measurement & Telemetry Suite
  quote: >
      Final Year Project at IMT Atlantique: Supporting Intelligent Network Selection.
  description: |
    - Engineered a **telemetry agent on Raspberry Pi** to collect real-time Wireless Network KPIs (Latency, RSRP, Throughput, GPS).
